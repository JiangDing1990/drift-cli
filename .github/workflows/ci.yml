name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    # pnpm v11 requires Node.js >= 22.13.
    # The package itself (engines.node) still supports Node.js >= 18 at runtime;
    # the matrix covers only versions compatible with our dev toolchain.
    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Version is read from packageManager field in package.json.
        # No explicit version needed here.

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test:run

      - name: Build
        run: pnpm run build
